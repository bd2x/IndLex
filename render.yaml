databases:
  - name: ap90-db
    plan: free

services:
  # 1) Frontend: static site
  - type: web
    name: ap90-frontend
    runtime: static
    rootDir: frontend
    staticPublishPath: .
    # buildCommand: ""  # optional if you're just serving raw HTML

  # 2) Backend: Flask API
  - type: web
    name: ap90-api
    runtime: python
    rootDir: api
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn app:app
    envVars:
      # Render will inject the DB connection string into DATABASE_URL
      - key: DATABASE_URL
        fromDatabase:
          name: ap90-db
          property: connectionString
      # Configure CORS to allow the static site origin (set your real URL after first deploy)
      - key: FRONTEND_ORIGIN
        value: https://ap90-frontend.onrender.com
      - key: SECRET_KEY
        value: change-me-to-a-long-random-string
